{%extends "base.html"%}

{%block title%}Account{%endblock%}

{%include "partials/form_errors.html"%}

{%block content%}

<div class="flex justify-center min-h-[60vh]">
    <div class="max-w-sm w-full m-auto p-6 bg-white shadow-md rounded-lg border border-gray-200">
        <h2 class="text-center text-xl font-semibold mb-6 underline">Account settings for {{current_user.username}}</h2>

        <div class="flex flex-col justify-center space-y-2 max-w-52 m-auto text-white p-2">
            <a href="{{url_for('auth.update_password')}}" class="bg-green-600 text-center hover:bg-green-700 block rounded-lg py-2 px-3 w-full">Update password?</a>

            <form action="{{url_for('auth.logout')}}"
                  method="post"
                  onsubmit="return confirm('are you sure you want to log out?')">
                <button class="bg-blue-600 hover:bg-blue-700 rounded-lg py-2 px-3 w-full">Logout</button>
            </form>

            <form action="{{url_for('auth.delete')}}"
                  method="post"
                  onsubmit="return confirm('are you sure you want to delete?')">
                <button class="bg-red-600 hover:bg-red-700 rounded-lg py-2 px-3 w-full">Delete account</button>
            </form>
        </div>
    </div>
</div>

{%endblock%}
